services:
  # 데이터베이스 (항상 가동)
  db:
    image: postgres:15-alpine
    container_name: travel-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: traveldb
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  # Spring Boot 앱
  app:
    image: ghcr.io/khu-semothon/semothon_backend:latest
    container_name: travel-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/traveldb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  # 리버스 프록시 (항상 가동)
  nginx:
    image: nginx:alpine
    container_name: travel-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
      - db

networks:
  default:
    name: travel-network